name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          SSH_HOST=$(echo "${{ vars.SSH_PATH }}" | cut -d: -f1 | cut -d@ -f2)
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude 'data/tools4regnum.sqlite' \
            --exclude '.env' \
            --exclude '.git' \
            --exclude 'data/' \
            --exclude 'public/uploads/' \
            ./ ${{ vars.SSH_PATH }}

      - name: Sync data files (no delete)
        run: |
          rsync -avz \
            --exclude 'tools4regnum.sqlite' \
            ./data/ ${{ vars.SSH_PATH }}data/

      - name: Restart containers
        run: |
          SSH_USER_HOST=$(echo "${{ vars.SSH_PATH }}" | cut -d: -f1)
          SSH_DIR=$(echo "${{ vars.SSH_PATH }}" | cut -d: -f2)
          ssh -o StrictHostKeyChecking=no "$SSH_USER_HOST" \
            "cd $SSH_DIR && docker compose down && docker compose up --build -d --remove-orphans"
